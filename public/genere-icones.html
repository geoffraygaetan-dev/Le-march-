<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Générer les icônes PWA</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 400px; margin: 0 auto; }
    h1 { font-size: 1.2rem; }
    p { color: #666; font-size: 0.9rem; }
    button { margin: 0.5rem 0.5rem 0 0; padding: 0.6rem 1rem; background: #2d8a4e; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { opacity: 0.9; }
    canvas { display: none; }
  </style>
</head>
<body>
  <h1>Icônes pour « Le Marché »</h1>
  <p>Clique pour télécharger chaque icône, puis place-les dans le dossier <code>public/icons/</code> de ton projet.</p>
  <button id="dl192">Télécharger icon-192.png</button>
  <button id="dl512">Télécharger icon-512.png</button>
  <canvas id="c"></canvas>

  <script>
    function drawIcon(ctx, size) {
      const s = size;
      ctx.fillStyle = "#fdf6ec";
      ctx.fillRect(0, 0, s, s);
      ctx.strokeStyle = "#2d8a4e";
      ctx.fillStyle = "#2d8a4e";
      ctx.lineWidth = Math.max(2, s / 24);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(s * 0.25, s * 0.25);
      ctx.lineTo(s * 0.35, s * 0.25);
      ctx.lineTo(s * 0.42, s * 0.47);
      ctx.lineTo(s * 0.78, s * 0.47);
      ctx.lineTo(s * 0.85, s * 0.25);
      ctx.lineTo(s * 0.75, s * 0.25);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(s * 0.5, s * 0.72, s * 0.22, s * 0.08, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(s * 0.5, s * 0.62, s * 0.2, s * 0.06, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    function download(size) {
      const c = document.getElementById("c");
      c.width = size;
      c.height = size;
      const ctx = c.getContext("2d");
      drawIcon(ctx, size);
      c.toBlob((blob) => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "icon-" + size + ".png";
        a.click();
        URL.revokeObjectURL(a.href);
      }, "image/png");
    }
    document.getElementById("dl192").onclick = () => download(192);
    document.getElementById("dl512").onclick = () => download(512);
  </script>
</body>
</html>
